name: Tests

# Regression tests + a real PostgreSQL migration smoke test. Mirrors the gate
# added upstream after a SQLite-only-valid migration once failed on PostgreSQL:
# migrations are exercised against Postgres in CI before release.

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "alembic/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "alembic/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest (regression suite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          # Fast, hermetic: models -> in-memory SQLite, seeded via crud.seed_defaults.
          DATABASE_URL: "sqlite:///:memory:"
        run: python -m pytest tests/ -q

  migrations-postgres:
    name: Alembic migrations on PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inktrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # env.py normalizes postgresql:// -> postgresql+psycopg:// (psycopg3).
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/inktrack_test"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upgrade to head on PostgreSQL
        run: python -m alembic upgrade head

      - name: Re-run upgrade head (idempotency)
        run: python -m alembic upgrade head
