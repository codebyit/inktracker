name: Desktop (Windows)

# Builds the InkTrack Windows desktop app and (on a version tag) publishes it:
#   Tailwind assets -> PyInstaller (onedir + onefile) -> smoke-test the packaged
#   binary -> Inno Setup installer -> GitHub Release.
#
# Signing & Store packaging are GATED on repository config so the core build is
# always green even before those are set up (see BUILD.md):
#   * sign  job runs only when the SIGNPATH_PROJECT_SLUG variable is set; it
#     code-signs the installer + portable via the SignPath Foundation.
#   * msix  job runs only when the MSIX_IDENTITY_NAME variable is set; it builds
#     an unsigned Microsoft Store .msix from the onedir output.
# When signing is NOT configured, the build job attaches the UNSIGNED installer
# and portable to the Release so there is always a usable download.
#
# No Docker / registry is involved in this path.

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "desktop/**"
      - "packaging/**"
      - "app/**"
      - "static/**"
      - "alembic/**"
      - "requirements.txt"
      - "package.json"
      - ".github/workflows/desktop-windows.yml"
  workflow_dispatch:

permissions:
  contents: write   # create/upload to the GitHub Release on tag builds
  actions: read     # SignPath action reads the build artifact via the API

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    # Windows/desktop builds are stable-only. A prerelease tag (SemVer with a
    # hyphen, e.g. v0.14.0-beta.1) is a Docker-only beta channel: skip the whole
    # Windows path (installer, portable, signing, MSIX/Store) for those tags.
    # PRs and manual workflow_dispatch runs are unaffected. Downstream sign/msix
    # jobs need this build, so skipping it here also skips them.
    if: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-')) }}
    outputs:
      version: ${{ steps.ver.outputs.version }}
      signable-artifact-id: ${{ steps.upload_signable.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend assets (Tailwind + jsQR)
        shell: pwsh
        timeout-minutes: 8
        run: |
          if (Test-Path package-lock.json) { npm ci } else { npm install }
          npm run build:css
          npm run vendor:jsqr

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            desktop/requirements-desktop.txt
            desktop/requirements-build.txt

      - name: Install desktop + build dependencies
        timeout-minutes: 12
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop/requirements-desktop.txt -r desktop/requirements-build.txt

      - name: Parity check (desktop runs the same app, no fork)
        timeout-minutes: 3
        run: python -c "import app.main; print('app import OK', app.main.APP_VERSION)"

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Exclude build dirs from Defender (avoid first-launch scan stalls)
        shell: pwsh
        continue-on-error: true
        run: |
          # The packaged exe is unsigned; Defender real-time scanning of a fresh
          # 40 MB binary can add minutes to first launch. Excluding the build
          # output keeps the smoke-test fast and deterministic on CI.
          Add-MpPreference -ExclusionPath (Join-Path $PWD 'dist') -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath (Join-Path $PWD 'build_pyi') -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath $env:RUNNER_TEMP -ErrorAction SilentlyContinue

      - name: Build (PyInstaller, onedir)
        timeout-minutes: 15
        run: pyinstaller desktop/inktrack.spec --noconfirm --distpath dist --workpath build_pyi

      - name: Smoke-test the packaged binary
        shell: pwsh
        timeout-minutes: 6
        run: |
          $env:INKTRACK_SELFTEST = "1"
          # Reproduce the real windowed (no-console) condition (stdout/stderr =
          # None). Redirected stdio below would otherwise hide the startup
          # logging crash that broke the shipped desktop build.
          $env:INKTRACK_SIMULATE_NO_CONSOLE = "1"
          $env:INKTRACK_DATA_DIR = Join-Path $env:RUNNER_TEMP "inktrack_ci"
          $log = Join-Path $env:RUNNER_TEMP "selftest.log"
          if (Test-Path $log) { Remove-Item $log -Force }

          # Capture the packaged app's own stdout/stderr so a stall is visible,
          # and bound the wait so a hang fails fast (instead of the 30/45-min job
          # timeout) with diagnostics.
          $p = Start-Process -FilePath "dist\InkTrack\InkTrack.exe" -PassThru `
                 -RedirectStandardOutput $log -RedirectStandardError "$log.err"
          # Cache the process handle BEFORE waiting; otherwise a -PassThru process
          # object reports a $null ExitCode after it exits (PowerShell quirk),
          # which would spuriously fail this step even on a healthy app.
          $null = $p.Handle
          $exited = $p.WaitForExit(120000)   # 120s
          if (-not $exited) {
            Write-Host "::error::Packaged self-test did not exit within 120s; killing."
            try { Stop-Process -Id $p.Id -Force } catch {}
            Write-Host "----- selftest stdout -----"; if (Test-Path $log) { Get-Content $log }
            Write-Host "----- selftest stderr -----"; if (Test-Path "$log.err") { Get-Content "$log.err" }
            throw "Packaged self-test timed out."
          }
          Write-Host "----- selftest stdout -----"; if (Test-Path $log) { Get-Content $log }
          Write-Host "----- selftest stderr -----"; if (Test-Path "$log.err") { Get-Content "$log.err" }
          if ($p.ExitCode -ne 0) { throw "Packaged self-test failed (exit $($p.ExitCode))." }
          Write-Host "Packaged self-test passed."

      - name: Package portable (ZIP of the onedir)
        shell: pwsh
        timeout-minutes: 5
        run: |
          # The portable download is a ZIP of the onedir folder, NOT a onefile
          # exe: onefile extracts an unsigned python DLL to temp, which Windows
          # Application Control / Smart App Control blocks. The onedir loads its
          # DLLs from beside the (signed) exe, so the unzip-and-run portable is
          # robust on locked-down machines.
          #
          # Package WITH a top-level InkTrack\ folder plus a READ-ME so the zip
          # cannot be run from inside Explorer's zip viewer (which extracts the
          # exe to %TEMP% without its _internal\ DLLs -> "Failed to load Python
          # DLL"). Users must Extract All, then run InkTrack\InkTrack.exe.
          $ver = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          $stage = Join-Path $env:RUNNER_TEMP "portable_stage"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "dist\InkTrack" (Join-Path $stage "InkTrack") -Recurse -Force
          @"
          InkTrack $ver - portable (no install)

          IMPORTANT: extract this ZIP first, then run the app.

          1. Right-click this ZIP -> "Extract All..." and pick a folder.
          2. Open the extracted folder and run:  InkTrack\InkTrack.exe

          Do NOT run InkTrack.exe from inside the ZIP (Windows opens it from a
          temporary folder without the InkTrack\_internal\ files, which causes a
          "Failed to load Python DLL" error). Prefer the installer if unsure.

          Your data is stored in %LOCALAPPDATA%\InkTrack and is kept when you
          delete this folder. https://github.com/codebyit/inktracker
          "@ | Set-Content -Path (Join-Path $stage "READ ME FIRST.txt") -Encoding utf8
          Compress-Archive -Path "$stage\*" -DestinationPath "portable\InkTrack-$ver-portable.zip" -Force

      - name: Download Edge WebView2 bootstrapper
        shell: pwsh
        timeout-minutes: 3
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile "desktop/MicrosoftEdgeWebview2Setup.exe"

      - name: Build installer (Inno Setup)
        shell: pwsh
        timeout-minutes: 8
        run: |
          choco install innosetup --no-progress -y
          $dist = Join-Path $PWD "dist"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DDistDir=$dist" desktop\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: InkTrack-Setup-${{ steps.ver.outputs.version }}
          path: dist/InkTrack-Setup-*.exe
          if-no-files-found: error

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: InkTrack-${{ steps.ver.outputs.version }}-portable
          path: portable/InkTrack-*-portable.zip
          if-no-files-found: error

      # ---- Tag-only: stage release inputs ---------------------------------
      - name: Stage signable files
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path signable | Out-Null
          Copy-Item "dist\InkTrack-Setup-*.exe" signable\ -Force
          Copy-Item "portable\InkTrack-*-portable.zip" signable\ -Force
          Get-ChildItem signable

      - name: Upload signable artifact
        id: upload_signable
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: inktrack-signable
          path: signable/*
          if-no-files-found: error

      - name: Upload onedir for MSIX job
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && vars.MSIX_IDENTITY_NAME != ''
        uses: actions/upload-artifact@v7
        with:
          name: inktrack-onedir
          path: dist/InkTrack/**
          if-no-files-found: error

      # Fallback: when signing is NOT configured, publish the UNSIGNED build so a
      # tagged release always has a usable download. The sign job supersedes this
      # with signed binaries once SignPath is set up.
      - name: Attach UNSIGNED build to release
        if: startsWith(github.ref, 'refs/tags/v') && vars.SIGNPATH_PROJECT_SLUG == ''
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/InkTrack-Setup-*.exe
            portable/InkTrack-*-portable.zip

  # ----------------------------------------------------------------------------
  # Code signing via the SignPath Foundation (free OSS signing). Gated: only runs
  # once the SignPath project is approved and the repo variables/secret exist.
  # ----------------------------------------------------------------------------
  sign:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v') && vars.SIGNPATH_PROJECT_SLUG != ''
    steps:
      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ needs.build.outputs.signable-artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Attach SIGNED build to release
        uses: softprops/action-gh-release@v3
        with:
          files: signed/*

  # ----------------------------------------------------------------------------
  # Microsoft Store MSIX. Gated on MSIX_IDENTITY_NAME (your Partner Center
  # publisher identity). Produces an UNSIGNED .msix artifact — the Store re-signs
  # it on submission. Runs on a v* tag or via manual workflow_dispatch (so the
  # package can be regenerated on demand). See packaging/ and BUILD.md.
  # ----------------------------------------------------------------------------
  msix:
    needs: build
    runs-on: windows-latest
    timeout-minutes: 20
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && vars.MSIX_IDENTITY_NAME != ''
    steps:
      - uses: actions/checkout@v7

      - name: Download onedir build
        uses: actions/download-artifact@v4
        with:
          name: inktrack-onedir
          path: onedir/InkTrack

      - name: Build MSIX
        shell: pwsh
        run: |
          ./packaging/make-msix.ps1 `
            -OneDir "onedir/InkTrack" `
            -Version "${{ needs.build.outputs.version }}" `
            -IdentityName "${{ vars.MSIX_IDENTITY_NAME }}" `
            -Publisher "${{ vars.MSIX_PUBLISHER }}" `
            -PublisherDisplayName "${{ vars.MSIX_PUBLISHER_DISPLAY_NAME }}" `
            -OutMsix "InkTrack-${{ needs.build.outputs.version }}.msix"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: InkTrack-${{ needs.build.outputs.version }}-msix
          path: InkTrack-*.msix
          if-no-files-found: error

