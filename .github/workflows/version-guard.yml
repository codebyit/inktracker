name: Version Guard

# Enforces the versioning policy (see VERSIONING.md):
#   * VERSION == package.json.version  (always)
#   * on a v* tag: tag == VERSION       (release integrity)
#   * on a v* tag: a matching CHANGELOG entry exists
#
# Cheap, read-only checks. Does NOT build or deploy.

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  version-guard:
    name: Validate version sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: VERSION == package.json
        run: npm run version:check

      - name: Tag matches VERSION (release tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Prerelease tags (Docker-only betas, e.g. v0.14.0-beta.1) share the
          # base VERSION; strip the -prerelease suffix before comparing.
          BASE="${TAG%%-*}"
          FILE="$(tr -d '\n' < VERSION)"
          if [ "$BASE" != "$FILE" ]; then
            echo "::error::Tag v$TAG (base $BASE) does not match VERSION file ($FILE)."
            exit 1
          fi
          if [ "$TAG" != "$BASE" ]; then
            echo "OK: prerelease tag v$TAG matches base VERSION ($FILE)"
          else
            echo "OK: tag v$TAG matches VERSION ($FILE)"
          fi

      - name: CHANGELOG entry exists (stable release tags only)
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
        run: |
          FILE="$(tr -d '\n' < VERSION)"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing."
            exit 1
          fi
          if ! grep -qE "^##\s*\[?${FILE}\]?" CHANGELOG.md; then
            echo "::error::No CHANGELOG.md entry found for version ${FILE}."
            exit 1
          fi
          echo "OK: CHANGELOG entry present for ${FILE}"
